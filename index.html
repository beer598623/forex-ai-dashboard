<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Forex AI Intelligence Terminal — institutional-grade two-stage AI market scanner">
  <title>Forex AI · Intelligence Terminal</title>
  <link rel="stylesheet" href="css/terminal.css">
</head>
<body>
  <div class="status-bar" id="status-bar">
    <span class="pulse offline"></span>
    <span class="brand">FOREX AI · INTELLIGENCE TERMINAL</span>
    <span class="item"><span class="label">Loading</span><span class="value"><span class="loading"></span></span></span>
  </div>

  <nav class="tabs">
    <a href="index.html" class="tab active">Scanner</a>
    <a href="#" class="tab" style="opacity:0.4;pointer-events:none">Intelligence</a>
    <a href="#" class="tab" style="opacity:0.4;pointer-events:none">Performance</a>
    <a href="#" class="tab" style="opacity:0.4;pointer-events:none">Journal</a>
  </nav>

  <main class="main">
    <aside class="panel panel-filter">
      <div class="panel-header"><h2>Market Filter</h2></div>
      <div id="filter"><div class="empty-state"><span class="loading"></span></div></div>
    </aside>

    <section class="panel panel-opps">
      <div class="panel-header"><h2>Top Opportunities</h2><span class="count" id="opp-count"></span></div>
      <div id="opportunities"><div class="empty-state"><span class="loading"></span></div></div>
    </section>

    <aside class="panel panel-summary">
      <div class="panel-header"><h2>Asset Summary</h2></div>
      <div id="summary"><div class="empty-state"><span class="loading"></span></div></div>
    </aside>
  </main>

  <script src="js/data.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
